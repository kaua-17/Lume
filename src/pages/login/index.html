<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume/Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main>
        <section class="login">
            <div class="apresentacao">
                <img class="logo-img" src="../../assets/images/icon.svg" alt="">
                <h1 class="logo-nome">Lume</h1>
                <p>Entre para acessar sua conta e fazer pedidos</p>
            </div>


            <div class="form-login">
                <form action="/login" method="post">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required><br><br>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required><br><br>
                    <button type="submit">Login</button>
                </form>
            </div>


            <img class="imagem-experiencia" src="../../assets/images/container.svg" alt="">
        </section>
    </main>






</body>

</html>
