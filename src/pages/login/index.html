<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume/Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main>
        <img class="imagem-experiencia" src="../../assets/images/container.svg" alt="">
        <section class="login">
            <div class="apresentacao">
                <img class="logo-img" src="../../assets/images/icon.svg" alt="">
                <span class="logo-nome">Lume</span>
                <h2>Bem-vindo</h2>
                <p>Entre para acessar sua conta e fazer pedidos</p>
            </div>

            <div class="form-login">
                <form action="/login" method="post">
                    <label class="tag-login" for="email">Email:</label>
                    <input class="input-login" type="email" id="email" name="email" required><br><br>
                    <label class="tag-login" for="password">Password:</label>
                    <input class="input-login" type="password" id="password" name="password" required><br><br>
                    <button class="botao-login" type="submit">Entrar</button>
                </form>
            </div>


        </section>
        
    </main>






</body>

</html>
